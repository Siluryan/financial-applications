apiVersion: apps/v1
kind: Deployment
metadata:
  name: toxiproxy
  namespace: core-banking
  labels:
    app: toxiproxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: toxiproxy
  template:
    metadata:
      labels:
        app: toxiproxy
    spec:
      containers:
        - name: toxiproxy
          image: ghcr.io/shopify/toxiproxy:2.9.0
          ports:
            - name: api
              containerPort: 8474
            - name: proxy
              containerPort: 8666
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: toxiproxy
  namespace: core-banking
spec:
  selector:
    app: toxiproxy
  ports:
    - name: api
      port: 8474
      targetPort: 8474
    - name: proxy
      port: 8666
      targetPort: 8666
